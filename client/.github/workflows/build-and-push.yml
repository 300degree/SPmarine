name: build-and-push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get metadata
        id: meta
        run: |
          echo "::set-output name=tags::beta-v0.0.1"
  
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Setup DockerBuildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0

      - name: Login to DockerHub
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Image
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v5.0
        with:
          context: .
          platforms: linux/amd64,linux/i368,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/SPmarine:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
